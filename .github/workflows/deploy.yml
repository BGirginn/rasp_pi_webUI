name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to staging Pi (native)
        run: |
          ssh -o StrictHostKeyChecking=no pi@staging-pi.tail-net "
            cd /opt/pi-control &&
            git pull --ff-only &&
            sudo ./install.sh --upgrade
          "

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Backup and deploy to production Pi (native)
        run: |
          ssh -o StrictHostKeyChecking=no pi@prod-pi.tail-net "
            cd /opt/pi-control &&
            python3 -m panel.api.db.migrations backup /opt/pi-control/backups/backup-pre-deploy.db || true &&
            git pull --ff-only &&
            sudo ./install.sh --upgrade
          "

      - name: Health check
        run: |
          sleep 30
          curl --fail https://prod-pi.tail-net/api/health || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Consider rolling back."

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify failure
        if: needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure'
        run: |
          echo "Deployment failed!"
          exit 1
