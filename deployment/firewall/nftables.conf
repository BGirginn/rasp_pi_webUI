#!/usr/bin/nft -f
# nftables configuration for Pi Control Panel
# Fail-closed firewall: Default DROP, allow only essential

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        
        # Allow established/related connections
        ct state established,related accept
        
        # Allow loopback
        iif lo accept
        
        # Allow ICMPv6 (required for IPv6)
        ip6 nexthdr icmpv6 accept
        
        # Allow ICMP ping
        ip protocol icmp accept
        
        # Allow SSH from Tailscale network only
        iifname "tailscale0" tcp dport 22 accept
        
        # Drop everything else (policy drop already set)
        # Explicitly log dropped packets for monitoring
        limit rate 5/minute log prefix "nftables-drop: " drop
    }
    
    chain forward {
        type filter hook forward priority 0; policy drop;
        
        # If acting as router/gateway, configure here
        # For single-host Pi, keep as drop
    }
    
    chain output {
        type filter hook output priority 0; policy accept;
        
        # Allow all outbound by default
        # Panel/Agent only communicate on localhost
        # Outbound connections for updates, NTP, etc. are allowed
    }
}

